<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="auth-css/login.css" />
    <title>Login | Pablo-De Jesus Dental Center</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Afacad:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>

<body>

    <div class="login-container">
        <!-- HEADER -->
        <div class="login-header">
            <h1>Welcome Back</h1>
            <p>Please enter your details</p>
        </div>

        <!-- FORM -->
        <form id="loginForm" class="form-stack" novalidate>
            <div class="form-group">
                <label for="email">Email <span class="required">*</span></label>
                <input type="email" id="email" name="email" placeholder="Email" required />
            </div>

            <div class="form-group">
                <label for="password">Password <span class="required">*</span></label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" placeholder="Enter password" required />
                    <button type="button" class="toggle-password" aria-label="Toggle password visibility"
                        data-target="password">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="form-row-actions">
                <label class="remember-me">
                    <input type="checkbox" id="rememberMe" name="rememberMe" value="true" required />
                    <span>Remember me</span>
                </label>
                <a href="forgot.html" class="forgot-link">Forgot Password?</a>
            </div>
            <button type="submit" class="btn-login">Login</button>
            <div class="divider">
                <span>or</span>
            </div>
            <p class="register-link">
                Don't have an account? <a href="register.html">Register here</a>
            </p>
        </form>
    </div>
    <script src="auth-js/login.js"></script>
</body>
</html>
