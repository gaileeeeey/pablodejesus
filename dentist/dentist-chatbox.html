<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dentist Chatbox | Pablo-De Jesus Dental Center</title>
    <link rel="stylesheet" href="dentist-css/dentist-chatbox.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
</head>

<body>
    <!-- ─── SIDEBAR TOGGLE (mobile) ─── -->
    <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
        <i class="bi bi-list"></i>
    </button>
    <!-- ─── SIDEBAR OVERLAY ─── -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <!-- ─── SIDEBAR ─── -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <h2>Pablo-De Jesus<br /><span>Dental Center</span></h2>
        </div>
        <nav class="sidebar-nav">
            <a href="dentist-dash.html"><i class="bi bi-house"></i> Dashboard</a>
            <a href="dentist-appointment.html"><i class="bi bi-person-vcard"></i> Appointments</a>
            <a href="dentist-patients.html"><i class="bi bi-people"></i> Patients Records</a>
            <a href="#" class="active"><i class="bi bi-chat-dots"></i> Chatbox</a>
            <a href="dentist-settings.html"><i class="bi bi-gear"></i> Settings</a>
            <a href="#" class="logout"><i class="bi bi-box-arrow-right"></i> Logout</a>
        </nav>
    </aside>

    <!-- ─── MAIN CONTENT ─── -->
    <main class="main-content">

        <!-- TOP BAR -->
        <div class="top-bar">
            <div class="greeting">
                <h1>Chatbox</h1>
                <p>Respond to patient inquiries and messages</p>
            </div>
            <div class="user-actions" onclick="window.location.href='dentist-settings.html'">
                <span class="user-name">Doc Womark</span>
                <i class="bi bi-person-circle user-avatar"></i>
            </div>
        </div>

        <!-- ─── CHAT LAYOUT ─── -->
        <div class="chat-layout">

            <!-- LEFT: Conversation List -->
            <div class="conv-panel">
                <div class="conv-search">
                    <i class="bi bi-search"></i>
                    <input type="text" id="convSearch" placeholder="Search conversations here..." />
                </div>
                <div class="conv-list" id="convList">
                    <!-- populated by JavaScript -->
                </div>
            </div>

            <!-- RIGHT: Chat Window -->
            <div class="chat-panel">

                <!-- Chat Header -->
                <div class="chat-header">
                    <span class="chat-header-name" id="chatHeaderName">Aldrin Santiago</span>
                </div>

                <!-- Messages -->
                <div class="chat-messages" id="chatMessages">
                    <!-- populated by JavaScript -->
                </div>

                <!-- Input Bar -->
                <div class="chat-input-bar">
                    <input type="text" id="chatInput" class="chat-input" placeholder="Type your message here..." />
                    <button class="chat-send-btn" id="chatSendBtn" aria-label="Send">
                        <i class="bi bi-send-fill"></i>
                    </button>
                </div>
            </div>
        </div>

    </main>

    <!-- ─── LOGOUT CONFIRMATION MODAL ─── -->
    <div class="logout-modal-overlay" id="logoutModal">
        <div class="logout-modal">
            <div class="modal-icon">
                <i class="bi bi-box-arrow-right"></i>
            </div>
            <h3>Logout?</h3>
            <p>Are you sure you want to log out? You will be redirected to the login page.</p>
            <div class="modal-actions">
                <button class="btn-stay" id="stayBtn">Stay</button>
                <button class="btn-logout" id="confirmLogoutBtn">Logout</button>
            </div>
        </div>
    </div>

    <script src="dentist-js/dentist-chatbox.js"></script>
</body>
</html>
